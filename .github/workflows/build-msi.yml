name: Build MSI

on:
  push:
    branches: [master, 'fix/**', 'feat/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install WiX Toolset v3
        run: choco install wixtoolset -y

      - name: Find WiX v3 directory
        run: |
          $dir = Get-ChildItem "C:\Program Files (x86)\WiX Toolset v3.*" -Directory | Select-Object -First 1
          echo "WIX_DIR=$($dir.FullName)" >> $env:GITHUB_ENV
          echo "WiX v3 at: $($dir.FullName)"
        shell: pwsh

      - name: Restore NuGet packages
        run: dotnet restore MakeMeAdmin.sln -p:RuntimeIdentifier=win-x64

      - name: Build solution
        run: msbuild MakeMeAdmin.sln /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64 /p:WixToolDir="$env:WIX_DIR"
        shell: pwsh

      - name: Install WiX Toolset v4
        run: dotnet tool install --global wix

      - name: Build MSI
        run: dotnet build Setup/Setup.wixproj -c Release -p:Platform=x64

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: MakeMeAdmin-Installer-${{ github.ref_name }}
          path: Installers/*.msi
