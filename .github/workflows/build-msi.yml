name: Build MSI

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install WiX Toolset v3
        run: choco install wixtoolset -y

      - name: Find WiX v3 directory
        run: |
          $dir = Get-ChildItem "C:\Program Files (x86)\WiX Toolset v3.*" -Directory | Select-Object -First 1
          echo "WIX3_DIR=$($dir.FullName)" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Restore and build all projects
        continue-on-error: true
        run: |
          dotnet restore MakeMeAdmin.sln -p:RuntimeIdentifier=win-x64
          msbuild MakeMeAdmin.sln /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64 /p:Wix3Dir="$env:WIX3_DIR"
        shell: pwsh

      - name: Install WiX Toolset v4
        run: dotnet tool install --global wix

      - name: Build MSI
        run: msbuild Setup/Setup.wixproj /restore /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64 /p:Wix3Dir="$env:WIX3_DIR"
        shell: pwsh

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: MakeMeAdmin-Installer
          path: Installers/**/*.msi
