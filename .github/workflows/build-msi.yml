name: Build MSI

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install WiX Toolset v3
        run: choco install wixtoolset -y

      - name: Find WiX v3 directory
        run: |
          $dir = Get-ChildItem "C:\Program Files (x86)\WiX Toolset v3.*" -Directory | Select-Object -First 1
          echo "WIX3_DIR=$($dir.FullName)" >> $env:GITHUB_ENV
        shell: pwsh

      - name: Restore NuGet packages
        run: dotnet restore MakeMeAdmin.sln -p:RuntimeIdentifier=win-x64
        shell: pwsh

      - name: Build required projects
        run: |
          msbuild UserRequestApp/LocalUI.csproj /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64
          msbuild RemoteUI/RemoteUI.csproj /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64
          msbuild Service/Service.csproj /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64
          msbuild WiXCustomAction/WiXCustomAction.csproj /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64 /p:Wix3Dir="$env:WIX3_DIR"
        shell: pwsh

      - name: Install WiX Toolset v4
        run: dotnet tool install --global wix

      - name: Build MSI
        run: msbuild Setup/Setup.wixproj /restore /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64 /p:Wix3Dir="$env:WIX3_DIR"
        shell: pwsh

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: MakeMeAdmin-Installer
          path: Installers/**/*.msi

      - name: Update Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.5.0
          files: Installers/**/*.msi
          prerelease: false
          make_latest: true
          body: |
            ## v2.5.0

            ### Authentication and Identity
            - Windows Hello support -- PIN, fingerprint, or facial recognition
            - Entra ID / hybrid-join detection
            - UPN normalization for hybrid-joined devices
            - SID-to-name resolution with 5-tier fallback, including Entra ID IdentityStore cache lookup
            - Unified single-line syslog format with structured `SID=` field for SIEM integration

            ### Security Fixes
            - Default-deny policy -- remote administration requires explicit allow-list (VULN-01)
            - Authentication required by default (VULN-02)
            - DPAPI hardening -- `CurrentUser` scope with entropy salt (VULN-03)
            - WCF transport upgrade to `TransportWithMessageCredential` (VULN-04)
            - BinaryFormatter import removed (VULN-05)
            - Restrictive ACL on user data file (VULN-06)

            ### Operations
            - Syslog forwarding for all elevation and process events
            - Credential data excluded from all log output
            - GitHub Actions CI/CD for automated MSI builds
            - MSI `DisplayVersion` correctly reflects installed version

            See [CHANGELOG.md](https://github.com/0xEuphonioux/MakeMeAdmin/blob/master/CHANGELOG.md) for the full version history.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
