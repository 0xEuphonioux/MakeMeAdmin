name: Build MSI

on:
  push:
    branches: [master, 'fix/**', 'feat/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: dotnet restore MakeMeAdmin.sln

      - name: Build solution
        run: msbuild MakeMeAdmin.sln /p:Configuration=Release /p:Platform=x64 /m /t:Build

      - name: Install WiX Toolset
        run: dotnet tool install --global wix

      - name: Build MSI
        run: dotnet build Setup/Setup.wixproj -c Release -p:Platform=x64

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: MakeMeAdmin-Installer-${{ github.ref_name }}
          path: Installers/*.msi
