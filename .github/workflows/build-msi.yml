name: Build MSI

on:
  push:
    branches: [master, 'fix/**', 'feat/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install WiX Toolset v3
        run: choco install wixtoolset -y

      - name: Find WiX v3 directory
        run: |
          $dir = Get-ChildItem "C:\Program Files (x86)\WiX Toolset v3.*" -Directory | Select-Object -First 1
          echo "WIX_DIR=$($dir.FullName)" >> $env:GITHUB_ENV
          echo "WiX v3 at: $($dir.FullName)"
        shell: pwsh

      - name: Build all projects first
        continue-on-error: true
        run: dotnet build MakeMeAdmin.sln -c Release -p:Platform=x64 -p:WixToolDir="$env:WIX_DIR"
        shell: pwsh

      - name: Verify service exe exists
        run: |
          if (Test-Path "Service\bin\Release x64\MakeMeAdminService.exe") {
            echo "Service exe found!"
          } else {
            echo "Service exe NOT found, listing Service\bin\:"
            Get-ChildItem Service\bin\ -Recurse -Filter *.exe
          }
        shell: pwsh

      - name: Install WiX Toolset v4
        run: dotnet tool install --global wix

      - name: Build MSI
        run: dotnet build Setup/Setup.wixproj -c Release -p:Platform=x64 -p:WixToolDir="$env:WIX_DIR"
        shell: pwsh

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: MakeMeAdmin-Installer-${{ github.ref_name }}
          path: Installers/*.msi
