name: Build MSI

on:
  push:
    branches: [master, 'fix/**', 'feat/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install WiX Toolset v3
        run: choco install wixtoolset -y

      - name: Find WiX v3 directory
        run: |
          $dir = Get-ChildItem "C:\Program Files (x86)\WiX Toolset v3.*" -Directory | Select-Object -First 1
          echo "WIX3_DIR=$($dir.FullName)" >> $env:GITHUB_ENV
          echo "WiX v3 at: $($dir.FullName)"
        shell: pwsh

      - name: Restore and build all projects
        continue-on-error: true
        run: |
          dotnet restore MakeMeAdmin.sln -p:RuntimeIdentifier=win-x64
          msbuild MakeMeAdmin.sln /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64 /p:WixToolDir="$env:WIX3_DIR"
        shell: pwsh

      - name: Install WiX Toolset v4 (after build, before MSI)
        run: dotnet tool install --global wix

      - name: Build MSI
        run: |
          # Remove WiX v3 from PATH and unset WIX env var that points to v3
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notlike '*WiX Toolset v3*' }) -join ';'
          $env:WIX = $null
          Write-Host "wix.exe resolves to:"
          Get-Command wix.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
          msbuild Setup/Setup.wixproj /restore /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64 /p:WixToolDir="$env:WIX3_DIR"
        shell: pwsh

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: MakeMeAdmin-Installer-${{ github.ref_name }}
          path: Installers/*.msi
